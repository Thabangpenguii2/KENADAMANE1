<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STANDWA SAM ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="mp3/Kelvin-Momo-Emhlabeni-Ft-Da-Muziqal-Chef-Tracy-Thatohatsi-(HipHopKit.com).mp3" type="audio/mp3">
    </audio>

    <div class="container">

        <h1>STANDWA SAM ❤️</h1>

        <div class="slideshow">
            <img id="slide" src="images/IMG-20260219-WA0072.jpg" alt="Our Memories">
        </div>

        <p>
            Im going to limpopo for a month and i want you to play this once you miss me standwa sam.
            I love you so much.
        </p>

        <button id="musicBtn" class="btn">🎵 Play Music</button>

        <br><br>

        <a href="picture.html">
           class="btn"
           onclick="localStorage.setItem('musicTime', document.getElementById('bgMusic').currentTime)">
           Open My Heart 💌
        </a>

    </div>

    <script src="gallery.js"></script>

    <script>
        const music = document.getElementById("bgMusic");
        const btn = document.getElementById("musicBtn");

        // Restore music state and position
        window.addEventListener("load", () => {
            const savedTime = localStorage.getItem("musicTime");
            const musicOn = localStorage.getItem("music") === "on";

            if (savedTime) {
                music.currentTime = parseFloat(savedTime);
            }

            if (musicOn) {
                music.play().catch(() => {});
            }
        });

        // Play music when button clicked
        btn.addEventListener("click", () => {
            music.play();

            localStorage.setItem("music", "on");

            if (!window.musicSaver) {
                window.musicSaver = setInterval(() => {
                    localStorage.setItem("musicTime", music.currentTime);
                }, 1000);
            }
        });

        // Save position before page changes
        window.addEventListener("beforeunload", () => {
            localStorage.setItem("musicTime", music.currentTime);
        });
    </script>

</body>

</html>
