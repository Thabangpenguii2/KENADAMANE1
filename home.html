<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STANDWA SAM ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background Music (ONLY ONE) -->
    <audio id="bgMusic" loop>
        <source src="mp3/Kelvin-Momo-Emhlabeni-Ft-Da-Muziqal-Chef-Tracy-Thatohatsi-(HipHopKit.com).mp3" type="audio/mp3">
    </audio>

    <div class="container">

        <h1>Hey STANDWA SAM ❤️</h1>

        <div class="slideshow">
            <img id="slide" src="images/IMG-20260219-WA0072.jpg" alt="Our Memories">
        </div>

        <p>
            Im going to limpopo for a month and i want you to play this once you miss me standwa sam.
            I love you so much.
        </p>

        <button id="musicBtn" class="btn">🎵 Play Music</button>

        <br><br>

        <a href="picture.html" class="btn">Open My Heart 💌</a>

    </div>

    <script src="gallery.js"></script>

    <!-- MUSIC FIX SCRIPT -->
    <script>
        const music = document.getElementById("bgMusic");
        const btn = document.getElementById("musicBtn");

        // Play button
        btn.addEventListener("click", () => {
            music.play();
            localStorage.setItem("music", "on");
        });

        // Auto-resume if user already started music before
        window.addEventListener("load", () => {
            if (localStorage.getItem("music") === "on") {
                music.play();
            }
        });
    </script>

</body>

</html>
