<!DOCTYPE html>
<html>

<head>
    <title>Mr Moukangwe ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Mr Moukangwe 📸❤️</h1>

    <!-- Slideshow -->
    <div class="slideshow">
        <img id="slide" src="images 2/IMG-20260220-WA0031.jpg" alt="Gallery">
    </div>

    <br><br>

    <a href="home.html"
       class="btn"
       onclick="localStorage.setItem('musicTime', document.getElementById('bgMusic').currentTime)">
       🏠 Back Home
    </a>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="mp3/Kelvin-Momo-Emhlabeni-Ft-Da-Muziqal-Chef-Tracy-Thatohatsi-(HipHopKit.com).mp3" type="audio/mp3">
    </audio>

    <script src="edit.js"></script>

    <script>
        const music = document.getElementById("bgMusic");

        // Restore music position and state
        window.addEventListener("load", () => {
            const savedTime = localStorage.getItem("musicTime");
            const musicOn = localStorage.getItem("music") === "on";

            if (savedTime) {
                music.currentTime = parseFloat(savedTime);
            }

            if (musicOn) {
                music.play().catch(() => {});
            }
        });

        // Save music state
        music.addEventListener("play", () => {
            localStorage.setItem("music", "on");
        });

        music.addEventListener("pause", () => {
            localStorage.setItem("music", "off");
        });

        // Save current position every second
        setInterval(() => {
            localStorage.setItem("musicTime", music.currentTime);
        }, 1000);

        // Save position before leaving page
        window.addEventListener("beforeunload", () => {
            localStorage.setItem("musicTime", music.currentTime);
        });
    </script>

</body>

</html>
