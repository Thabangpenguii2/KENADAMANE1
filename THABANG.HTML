<!DOCTYPE html>
<html>

<head>
    <title>Mr Moukangwe ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Mr Moukangwe 📸❤️</h1>

    <!-- Slideshow -->
    <div class="slideshow">
        <img id="slide" src="images 2/IMG-20260220-WA0031.jpg" alt="Gallery">
    </div>

    <br><br>

    <a href="home.html" class="btn">🏠 Back Home</a>

    <!-- MUSIC (ONLY ONE) -->
    <audio id="bgMusic" loop>
        <source src="mp3/Kelvin-Momo-Emhlabeni-Ft-Da-Muziqal-Chef-Tracy-Thatohatsi-(HipHopKit.com).mp3" type="audio/mp3">
    </audio>

    <script src="edit.js"></script>

    <!-- MUSIC FIX -->
    <script>
        const music = document.getElementById("bgMusic");

        window.addEventListener("load", () => {
            if (localStorage.getItem("music") === "on") {
                music.play();
            }
        });

        music.addEventListener("play", () => {
            localStorage.setItem("music", "on");
        });

        music.addEventListener("pause", () => {
            localStorage.setItem("music", "off");
        });
    </script>

</body>

</html>
