<!DOCTYPE html>
<html>

<head>
    <title>MRS Moukangwe ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Mrs Moukangwe ❤️</h1>

    <img id="slide"
         src="images/IMG-20260219-WA0072.jpg"
         alt="MRS Moukangwe"
         width="300">

    <!-- Background Music (ONLY ONE) -->
    <audio id="bgMusic" loop>
        <source src="mp3/Kelvin-Momo-Emhlabeni-Ft-Da-Muziqal-Chef-Tracy-Thatohatsi-(HipHopKit.com).mp3" type="audio/mp3">
    </audio>

    <a href="Thabang.html" class="btn">
        YOUR MAN ❤️
    </a>

    <script src="gallery.js"></script>

    <!-- MUSIC FIX -->
    <script>
        const music = document.getElementById("bgMusic");

        window.addEventListener("load", () => {
            if (localStorage.getItem("music") === "on") {
                music.play();
            }
        });

        music.addEventListener("play", () => {
            localStorage.setItem("music", "on");
        });

        music.addEventListener("pause", () => {
            localStorage.setItem("music", "off");
        });
    </script>

</body>

</html>
