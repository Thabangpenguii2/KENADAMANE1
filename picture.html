<!DOCTYPE html>
<html>

<head>
    <title>MRS Moukangwe ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Mrs Moukangwe ❤️</h1>

    <img id="slide"
         src="images/IMG-20260219-WA0072.jpg"
         alt="MRS Moukangwe"
         width="300">

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="mp3/Kelvin-Momo-Emhlabeni-Ft-Da-Muziqal-Chef-Tracy-Thatohatsi-(HipHopKit.com).mp3" type="audio/mp3">
    </audio>

    <a href="Thabang.html"
       class="btn"
       onclick="localStorage.setItem('musicTime', document.getElementById('bgMusic').currentTime)">
        YOUR MAN ❤️
    </a>

    <script src="gallery.js"></script>

    <script>
        const music = document.getElementById("bgMusic");

        // Restore music position and state
        window.addEventListener("load", () => {
            const savedTime = localStorage.getItem("musicTime");
            const musicOn = localStorage.getItem("music") === "on";

            if (savedTime) {
                music.currentTime = parseFloat(savedTime);
            }

            if (musicOn) {
                music.play().catch(() => {});
            }
        });

        // Save music state
        music.addEventListener("play", () => {
            localStorage.setItem("music", "on");
        });

        music.addEventListener("pause", () => {
            localStorage.setItem("music", "off");
        });

        // Save current position every second
        setInterval(() => {
            localStorage.setItem("musicTime", music.currentTime);
        }, 1000);

        // Save position before leaving page
        window.addEventListener("beforeunload", () => {
            localStorage.setItem("musicTime", music.currentTime);
        });
    </script>

</body>

</html>
